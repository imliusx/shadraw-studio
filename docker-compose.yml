services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shadraw
      POSTGRES_PASSWORD: shadraw
      POSTGRES_DB: shadraw
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shadraw -d shadraw"]
      interval: 2s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-shadraw}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-shadrawsecret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    depends_on:
      - minio
    environment:
      S3_BUCKET: ${S3_BUCKET:-shadraw}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-shadraw}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-shadrawsecret}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$$S3_ACCESS_KEY_ID" "$$S3_SECRET_ACCESS_KEY"; do
          sleep 1
        done
        mc mb --ignore-existing "local/$$S3_BUCKET"

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      PORT: 8088
      LOG_LEVEL: info
      DB_DSN: postgres://shadraw:shadraw@db:5432/shadraw?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY is required}
      BLOB_DRIVER: ${BLOB_DRIVER:-local}
      DATA_DIR: /app/data
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-shadraw}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-shadraw}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-shadrawsecret}
      S3_USE_PATH_STYLE: ${S3_USE_PATH_STYLE:-true}
    ports:
      - "8088:8088"
    volumes:
      - ./data:/app/data
