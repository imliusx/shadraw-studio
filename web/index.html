<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>shadraw</title>
  </head>
  <body>
    <script>
      try {
        var palette = localStorage.getItem("shadraw-ui:color-theme")
        var allowed = [
          "default",
          "violet",
          "yellow",
          "sky",
          "blue",
          "red",
          "lime",
          "emerald",
          "pink",
        ]
        document.documentElement.dataset.palette = allowed.includes(palette)
          ? palette
          : "default"
      } catch (_) {
        document.documentElement.dataset.palette = "default"
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
